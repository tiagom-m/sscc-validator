services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  tests:
    image: eclipse-temurin:25-jdk
    container_name: backend-tests
    working_dir: /app/backend
    volumes:
      - .:/app
      - maven-cache:/root/.m2
    command: ./mvnw test
    profiles:
      - test

volumes:
  maven-cache:
